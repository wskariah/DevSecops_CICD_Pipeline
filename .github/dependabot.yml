version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    # versioning-strategy goes HERE, inside the maven config:
    maven:
      versioning-strategy: "increase"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    labels:
      - "dependencies"
      - "java"
      - "springboot"
    open-pull-requests-limit: 2