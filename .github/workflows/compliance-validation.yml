name: Compliance Checklist Validator
on:
  pull_request:
    types: [opened, edited, synchronize]
  issue_comment:
    types: [created, edited]

jobs:
  validate-checklist:
    runs-on: ubuntu-latest
    steps:
      - name: Check for unchecked items
        uses: actions/github-script@v6
        with:
          script: |
            const requiredItems = [
              "508 Deployment Recommendation Email or Self-certification of no accessibility Impact",
              "Social Security Number Retention Justification (F-14132) or self-certification of no SSN/TIN impact",
              "Privacy Threshold Assessment (PTA) / Privacy and Civil Liberties Impact Assessment (PCLIA)",
              "Security Compliance Scanning: (Qualys Vulnerability and Web Application, Database, Source Code, Configuration Compliance, etc.)",
              "Security Change Management (SecChM) - Change Request submitted with Scan evidence links",
              "Authorization to Operate (ATO) is current and validated with the Authorizing Official (AO)",
              "As-Built-Architecture – update submitted",
              "Computer Operator Handbook (COH) - appropriate information sent to the Enterprise Computing Center (ECC)"
            ];

            // For PRs
            if (context.payload.pull_request) {
              const body = context.payload.pull_request.body || '';
              const missingChecks = requiredItems.filter(item => !body.includes(`- [x] ${item}`));
              if (missingChecks.length > 0) {
                core.setFailed(`❌ Missing checked items: ${missingChecks.join(', ')}`);
              }
            }

            // For Issues
            if (context.payload.issue) {
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number
              });
              const missingChecks = requiredItems.filter(item => !issue.body.includes(`- [x] ${item}`));
              if (missingChecks.length > 0) {
                core.setFailed(`❌ Missing checked items: ${missingChecks.join(', ')}`);
              }
            }