name: Validate 508 Compliance in Checklist

on:
  push:
    paths:
      - '.github/compliance_checklist.md'
  pull_request:
    paths:
      - '.github/compliance_checklist.md'

jobs:
  validate-compliance:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Validate 508 Compliance Item
      id: check-508
      run: |
        FILE_PATH=".github/compliance_checklist.md"
        if grep -q "508 Deployment Recommendation Email or Self-certification of no accessibility Impact" "$FILE_PATH"; then
          echo "✅ 508 compliance item found in checklist"
          echo "result=pass" >> $GITHUB_OUTPUT
        else
          echo "::error file=$FILE_PATH::508 compliance item missing from checklist"
          echo "result=fail" >> $GITHUB_OUTPUT
          exit 1
        fi