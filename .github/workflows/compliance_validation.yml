name: Validate Full Compliance Checklist
on:
    push:
      branches: [ "main" ]
#   pull_request:
#     paths: ['.github/compliance_checklist.md']

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate All Sections
        id: check
        run: |
          # Define required sections
          declare -A SECTIONS=(
            ["508 Deployment"]="Date Completed:|URL:"
            ["SSN Retention"]="Date Completed:|URL:"
            ["PTA/PCLIA"]="Date Completed:|URL:"
            ["Security Scanning"]="Qualys Report Date:|SAST Results URL:"
            ["SecChM"]="Change Request ID:|Evidence URL:"
            ["ATO"]="Validation Date:|AO Approval URL:"
            ["As-Built"]="Update Date:|Documentation URL:"
            ["COH"]="Submission Date:|ECC Confirmation URL:"
          )

          FAILED=0
          FILE=".github/compliance_checklist.md"
          CONTENT=$(cat $FILE)

          # Check each section's requirements
          for SECTION in "${!SECTIONS[@]}"; do
            IFS='|' read -ra FIELDS <<< "${SECTIONS[$SECTION]}"
            for FIELD in "${FIELDS[@]}"; do
              if ! grep -q "$FIELD" <<< "$CONTENT"; then
                echo "::error file=$FILE,title=Missing Field::Section '$SECTION' missing '$FIELD'"
                FAILED=1
              fi
            done
          done

          # Check for unchecked boxes or placeholders
          if grep -q "- [ ]" $FILE || grep -q "<!--" $FILE; then
            echo "::error file=$FILE,title=Incomplete Items::Unchecked boxes or placeholders detected"
            FAILED=1
          fi

          exit $FAILED